<script>
(function() {
  'use strict';

  var BASE = 'https://huggingface.co/datasets/yanxingjianken/blocking-composites/resolve/main';
  var DATA_CACHE = new Map();

  var CONTOUR_GROUPS = ['contour_base', 'contour_omega', 'contour_tendency', 'contour_diabatic', 'contour_pv_grad'];
  var DEFAULT_SHADING = 'pv_dt';
  var DEFAULT_CONTOUR = '';   /* 'None' by default */
  var DEFAULT_ARROWS = 'none';

  /* Arrow options: resolved client-side against fields present in each level dict.
     Each entry lists one or more (u_field, v_field) pairs that are summed
     element-wise. If any listed field is absent the option yields null. */
  var ARROW_OPTIONS = [
    {id: 'none',              label: 'None',                                            pairs: []},
    {id: 'uv_total',          label: 'u, v (total)',                                    pairs: [['u', 'v']]},
    {id: 'uv_div',            label: 'u_div, v_div (bar + anom)',                       pairs: [['u_div_bar', 'v_div_bar'], ['u_div_anom', 'v_div_anom']]},
    {id: 'uv_div_adiabatic',  label: 'u_div_adiabatic, v_div_adiabatic',                pairs: [['u_div_adiabatic', 'v_div_adiabatic']]},
    {id: 'uv_div_diabatic',   label: 'u_div_diabatic, v_div_diabatic',                  pairs: [['u_div_diabatic', 'v_div_diabatic']]},
    {id: 'uv_div_qg_diabatic',label: 'u_div_qg_diabatic, v_div_qg_diabatic',            pairs: [['u_div_qg_diabatic', 'v_div_qg_diabatic']]},
    {id: 'uv_div_lhr',        label: 'u_div_lhr, v_div_lhr (moist latent heat)',        pairs: [['u_div_lhr_moist', 'v_div_lhr_moist']]},
    {id: 'uv_rot',            label: 'u_rot, v_rot (bar + anom)',                       pairs: [['u_rot_bar', 'v_rot_bar'], ['u_rot_anom', 'v_rot_anom']]},
    {id: 'uv_rot_bar',        label: 'u_rot_bar, v_rot_bar',                            pairs: [['u_rot_bar', 'v_rot_bar']]},
    {id: 'uv_rot_anom',       label: "u_rot_anom, v_rot_anom (u_rot', v_rot')",        pairs: [['u_rot_anom', 'v_rot_anom']]},
    {id: 'uv_anom',           label: "u_anom, v_anom (u', v')",                         pairs: [['u_anom', 'v_anom']]},
    {id: 'uv_bar',            label: 'u_bar, v_bar (ū, v̄)',                            pairs: [['u_bar', 'v_bar']]}
  ];

  /* Variant catalogs per event type — populated on first load */
  var VARIANT_CATALOGS = {};
  var catalogLoaded = {};
  var BASIS_CACHE = new Map();

  function getEventTypePrefix() {
    return document.getElementById('sel-event-type').value;  /* 'blocking' or 'prp' */
  }

  async function loadCatalog(eventType) {
    if (VARIANT_CATALOGS[eventType]) return VARIANT_CATALOGS[eventType];
    try {
      var resp = await fetch(BASE + '/' + eventType + '/_catalog.json');
      if (resp.ok) {
        var cat = await resp.json();
        VARIANT_CATALOGS[eventType] = cat;
        return cat;
      }
    } catch(e) { /* ignore */ }
    return null;
  }

  function rebuildVariantDropdown(catalog) {
    var sel = document.getElementById('sel-variant');
    sel.innerHTML = '';
    if (!catalog || !catalog.variants || catalog.variants.length === 0) {
      sel.innerHTML = '<option value="original" selected>All Events</option>';
      return;
    }
    /* Group variants: collect unique variant keys with display names */
    var seen = {};
    catalog.variants.forEach(function(e) {
      if (!seen[e.variant]) seen[e.variant] = e.display;
    });
    Object.keys(seen).forEach(function(vk) {
      var opt = document.createElement('option');
      opt.value = vk;
      opt.textContent = seen[vk];
      if (vk === 'original') opt.selected = true;
      sel.appendChild(opt);
    });
  }

  function getFieldScaleInfo(fieldId) {
    if (fieldId === 'z') return {scale: 1, unit: 'm'};
    if (fieldId === 'Q') return {scale: 86400, unit: 'K day⁻¹'};
    if (/^w($|_)/.test(fieldId)) return {scale: 1, unit: 'Pa s⁻¹'};
    if (/^u($|_)/.test(fieldId) || /^v($|_)/.test(fieldId)) return {scale: 1, unit: 'm s⁻¹'};
    if (['pv_anom','pv','pv_bar'].indexOf(fieldId) >= 0) return {scale: 1e6, unit: 'PVU'};
    return {scale: 1e6, unit: 'PVU s⁻¹'};
  }

  function scaleArray(arr, scale) {
    if (scale === 1) return arr;
    return arr.map(function(row) {
      return row.map(function(v) { return (v === null || !isFinite(v)) ? v : v * scale; });
    });
  }

  var currentData = null;
  var dropdownsBuilt = false;

  /* ---- Data fetching ---- */

  async function fetchData(variant, stage) {
    var et = getEventTypePrefix();
    var key = et + '/' + variant + '_' + stage;
    if (DATA_CACHE.has(key)) return DATA_CACHE.get(key);

    var url = BASE + '/' + et + '/' + variant + '_' + stage + '.json.gz';
    var resp = await fetch(url);
    if (!resp.ok) {
      if (resp.status === 404) return null;
      throw new Error('Fetch failed: ' + resp.status);
    }
    var ds = new DecompressionStream('gzip');
    var stream = resp.body.pipeThrough(ds);
    var text = await new Response(stream).text();
    var data = JSON.parse(text);
    DATA_CACHE.set(key, data);
    return data;
  }

  async function getAllEventBasisData(stage) {
    var et = getEventTypePrefix();
    var key = et + '/original_' + stage;
    /* Reuse main data cache if all-event variant is already loaded */
    if (DATA_CACHE.has(key)) return DATA_CACHE.get(key);
    if (BASIS_CACHE.has(key)) return BASIS_CACHE.get(key);
    document.getElementById('loading').style.display = 'block';
    try {
      var url = BASE + '/' + et + '/original_' + stage + '.json.gz';
      var resp = await fetch(url);
      if (!resp.ok) throw new Error('Fetch failed for all-event basis: ' + resp.status);
      var ds = new DecompressionStream('gzip');
      var stream = resp.body.pipeThrough(ds);
      var text = await new Response(stream).text();
      var bData = JSON.parse(text);
      BASIS_CACHE.set(key, bData);
      return bData;
    } finally {
      document.getElementById('loading').style.display = 'none';
    }
  }

  /* ---- Dropdown builders ---- */

  function buildShadingDropdown(meta) {
    var sel = document.getElementById('sel-shading');
    sel.innerHTML = '';
    var groups = meta.field_groups;
    var labels = meta.field_labels;

    Object.keys(groups).forEach(function(gid) {
      var grp = groups[gid];
      var og = document.createElement('optgroup');
      og.label = grp.label;
      grp.fields.forEach(function(fid) {
        var opt = document.createElement('option');
        opt.value = fid;
        opt.textContent = labels[fid] || fid;
        if (fid === DEFAULT_SHADING) opt.selected = true;
        og.appendChild(opt);
      });
      sel.appendChild(og);
    });

    /* PoM group */
    if (meta.pom_definitions && meta.pom_definitions.length > 0) {
      var pomOg = document.createElement('optgroup');
      pomOg.label = 'PoM (Product of Means)';
      meta.pom_definitions.forEach(function(pd) {
        var opt = document.createElement('option');
        opt.value = pd.id;
        opt.textContent = pd.label || pd.id;
        pomOg.appendChild(opt);
      });
      sel.appendChild(pomOg);
    }
  }

  function buildContourDropdown(meta) {
    var sel = document.getElementById('sel-contour');
    sel.innerHTML = '';
    var groups = meta.field_groups;
    var labels = meta.field_labels;

    /* None option (default) */
    var noneOpt = document.createElement('option');
    noneOpt.value = '';
    noneOpt.textContent = 'None';
    noneOpt.selected = (DEFAULT_CONTOUR === '');
    sel.appendChild(noneOpt);

    CONTOUR_GROUPS.forEach(function(gid) {
      if (!groups[gid]) return;
      var grp = groups[gid];
      var og = document.createElement('optgroup');
      og.label = grp.label;
      grp.fields.forEach(function(fid) {
        var opt = document.createElement('option');
        opt.value = fid;
        opt.textContent = labels[fid] || fid;
        if (fid === DEFAULT_CONTOUR) opt.selected = true;
        og.appendChild(opt);
      });
      sel.appendChild(og);
    });
  }

  function buildArrowsDropdown() {
    var sel = document.getElementById('sel-arrows');
    sel.innerHTML = '';
    ARROW_OPTIONS.forEach(function(opt) {
      var o = document.createElement('option');
      o.value = opt.id;
      o.textContent = opt.label;
      if (opt.id === DEFAULT_ARROWS) o.selected = true;
      sel.appendChild(o);
    });
  }

  function getArrowOption(optionId) {
    for (var i = 0; i < ARROW_OPTIONS.length; i++) {
      if (ARROW_OPTIONS[i].id === optionId) return ARROW_OPTIONS[i];
    }
    return null;
  }

  /* ---- Field array helper ---- */

  function getFieldArray(levelData, fieldId, meta) {
    if (levelData[fieldId]) return levelData[fieldId];

    /* PoM: compute product of means */
    var pomDef = null;
    if (meta.pom_definitions) {
      for (var k = 0; k < meta.pom_definitions.length; k++) {
        if (meta.pom_definitions[k].id === fieldId) {
          pomDef = meta.pom_definitions[k];
          break;
        }
      }
    }
    if (!pomDef) return null;

    var u = levelData[pomDef.u_wind];
    var v = levelData[pomDef.v_wind];
    var gx = levelData[pomDef.u_grad];
    var gy = levelData[pomDef.v_grad];
    if (!u || !v || !gx || !gy) return null;

    var ny = u.length, nx = u[0].length;
    var result = [];
    var sign = pomDef.negate ? -1 : 1;
    for (var j = 0; j < ny; j++) {
      result[j] = new Array(nx);
      for (var i = 0; i < nx; i++) {
        result[j][i] = sign * (u[j][i] * gx[j][i] + v[j][i] * gy[j][i]);
      }
    }
    return result;
  }

  function sumFieldArrays(levelData, fieldNames) {
    if (!fieldNames || fieldNames.length === 0) return null;
    var arrays = [];
    for (var i = 0; i < fieldNames.length; i++) {
      if (!levelData[fieldNames[i]]) return null;
      arrays.push(levelData[fieldNames[i]]);
    }
    var ny = arrays[0].length, nx = arrays[0][0].length;
    var out = [];
    for (var j = 0; j < ny; j++) {
      out[j] = new Array(nx);
      for (var k = 0; k < nx; k++) {
        var val = 0;
        var finite = true;
        for (var a = 0; a < arrays.length; a++) {
          var cell = arrays[a][j][k];
          if (cell === null || !isFinite(cell)) {
            finite = false;
            break;
          }
          val += cell;
        }
        out[j][k] = finite ? val : null;
      }
    }
    return out;
  }

  function getArrowComponents(levelData, arrowOpt) {
    if (!arrowOpt || !arrowOpt.pairs || arrowOpt.pairs.length === 0) return null;
    var pairs = arrowOpt.pairs;
    /* Verify every referenced field is present. */
    for (var p = 0; p < pairs.length; p++) {
      if (!levelData[pairs[p][0]] || !levelData[pairs[p][1]]) {
        if (typeof console !== 'undefined' && console.warn) {
          console.warn('Arrow option ' + arrowOpt.id + ' missing field: ' + pairs[p][0] + '/' + pairs[p][1]);
        }
        return null;
      }
    }
    var u0 = levelData[pairs[0][0]];
    var v0 = levelData[pairs[0][1]];
    var ny = u0.length, nx = u0[0].length;
    var u = [], v = [];
    for (var j = 0; j < ny; j++) {
      u[j] = new Array(nx);
      v[j] = new Array(nx);
      for (var i = 0; i < nx; i++) {
        var us = 0, vs = 0, finite = true;
        for (var k = 0; k < pairs.length; k++) {
          var uk = levelData[pairs[k][0]][j][i];
          var vk = levelData[pairs[k][1]][j][i];
          if (uk === null || vk === null || !isFinite(uk) || !isFinite(vk)) {
            finite = false;
            break;
          }
          us += uk;
          vs += vk;
        }
        u[j][i] = finite ? us : null;
        v[j][i] = finite ? vs : null;
      }
    }
    return {u: u, v: v};
  }

  function niceArrowMag(m) {
    /* Pick the largest ladder entry <= m. Supports tiny magnitudes (down to 0.01 m/s)
       so divergent-wind options (~0.05-0.5 m/s) still get a reasonable reference. */
    var ladder = [0.01, 0.02, 0.05, 0.1, 0.2, 0.5, 1, 2, 5, 10, 20, 50, 100, 200, 500];
    var pick = ladder[0];
    for (var i = 0; i < ladder.length; i++) {
      if (ladder[i] <= m) pick = ladder[i];
    }
    return pick;
  }

  function buildArrowGeometry(u2d, v2d, x, y, arrowScale) {
    /* Build arrow line + arrowhead segments starting from (x[i], y[j]).
       Samples every stepX in x and stepY in y. Returns {xs, ys, stepX, stepY}. */
    var stepX = Math.max(1, Math.floor((x.length - 1) / 10));
    var stepY = Math.max(1, Math.floor((y.length - 1) / 8));
    var headFrac = 0.28;
    var headAngle = Math.PI / 7;
    var xs = [], ys = [];
    for (var j = 0; j < u2d.length; j += stepY) {
      for (var i = 0; i < u2d[j].length; i += stepX) {
        var uHere = u2d[j][i];
        var vHere = v2d[j][i];
        if (uHere === null || vHere === null || !isFinite(uHere) || !isFinite(vHere)) continue;
        var dx = uHere * arrowScale;
        var dy = vHere * arrowScale;
        var magHere = Math.hypot(dx, dy);
        if (!isFinite(magHere) || magHere <= 0) continue;
        var x0 = x[i];
        var y0 = y[j];
        var x1 = x0 + dx;
        var y1 = y0 + dy;
        xs.push(x0, x1, null);
        ys.push(y0, y1, null);
        var theta = Math.atan2(dy, dx);
        var headLen = magHere * headFrac;
        xs.push(x1, x1 - headLen * Math.cos(theta - headAngle), null);
        ys.push(y1, y1 - headLen * Math.sin(theta - headAngle), null);
        xs.push(x1, x1 - headLen * Math.cos(theta + headAngle), null);
        ys.push(y1, y1 - headLen * Math.sin(theta + headAngle), null);
      }
    }
    return {xs: xs, ys: ys, stepX: stepX, stepY: stepY};
  }

  /* Build arrow traces AND a reference-legend annotation anchored at bottom-right
     of the panel (paper coordinates). Returns { traces: [...], annotation: {...} }
     or null if the option cannot be resolved. */
  function buildVectorOverlayTrace(levelData, arrowOpt, x, y) {
    var comp = getArrowComponents(levelData, arrowOpt);
    if (!comp) return null;

    /* Find max magnitude (sample same subgrid used for rendering). */
    var sampStepX = Math.max(1, Math.floor((x.length - 1) / 10));
    var sampStepY = Math.max(1, Math.floor((y.length - 1) / 8));
    var maxMag = 0;
    for (var jj = 0; jj < comp.u.length; jj += sampStepY) {
      for (var ii = 0; ii < comp.u[jj].length; ii += sampStepX) {
        var uVal = comp.u[jj][ii];
        var vVal = comp.v[jj][ii];
        if (uVal === null || vVal === null || !isFinite(uVal) || !isFinite(vVal)) continue;
        var mag = Math.hypot(uVal, vVal);
        if (mag > maxMag) maxMag = mag;
      }
    }
    if (!isFinite(maxMag) || maxMag <= 0) return null;

    var domainSpan = Math.min(Math.abs(x[x.length - 1] - x[0]), Math.abs(y[y.length - 1] - y[0]));
    var arrowScale = (0.13 * domainSpan) / maxMag;

    var geom = buildArrowGeometry(comp.u, comp.v, x, y, arrowScale);
    var arrowTrace = {
      x: geom.xs,
      y: geom.ys,
      type: 'scatter',
      mode: 'lines',
      line: {color: 'rgba(0,0,0,0.82)', width: 1.3},
      hoverinfo: 'skip',
      showlegend: false
    };

    /* Reference legend: place a fixed-magnitude reference arrow near the bottom-right
       of the data axes, with an m/s label annotation. The reference arrow sits in
       data coordinates so it scales with the same arrowScale as the field. */
    var refMag = niceArrowMag(maxMag);
    var xLeft  = Math.min(x[0], x[x.length - 1]);
    var xRight = Math.max(x[0], x[x.length - 1]);
    var yLow   = Math.min(y[0], y[y.length - 1]);
    var yHigh  = Math.max(y[0], y[y.length - 1]);
    var xSpan  = xRight - xLeft;
    var ySpan  = yHigh - yLow;
    var refShaft = refMag * arrowScale;
    var refTipX  = xRight - 0.04 * xSpan;
    var refTipY  = yLow   + 0.06 * ySpan;
    var refTailX = refTipX - refShaft;
    var refTailY = refTipY;
    /* Build an arrow of length refShaft pointing right. */
    var refU = [[refMag]];
    var refV = [[0]];
    var refGeom = buildArrowGeometry(refU, refV, [refTailX, refTailX + refShaft], [refTailY], arrowScale);
    var refTrace = {
      x: refGeom.xs,
      y: refGeom.ys,
      type: 'scatter',
      mode: 'lines',
      line: {color: 'rgba(0,0,0,0.95)', width: 1.8},
      hoverinfo: 'skip',
      showlegend: false
    };
    var refLabel = {
      x: (refTailX + refTipX) / 2,
      y: refTipY - 0.025 * ySpan,
      xref: 'x',
      yref: 'y',
      text: refMag + ' m s⁻¹',
      showarrow: false,
      font: {size: 10, color: '#000'},
      bgcolor: 'rgba(255,255,255,0.75)',
      bordercolor: 'rgba(0,0,0,0.4)',
      borderwidth: 0.5,
      borderpad: 2,
      xanchor: 'center',
      yanchor: 'top'
    };
    return {traces: [arrowTrace, refTrace], annotation: refLabel};
  }

  /* ---- Rendering ---- */

  function renderPanels(data, level, shadingField, contourField, arrowsField) {
    var dhKeys = ['dh_m12', 'dh_0', 'dh_p12'];
    var dhLabels = ['dh = −12 h', 'dh = 0', 'dh = +12 h'];
    var x = data.coords.x_rel;
    var y = data.coords.y_rel;
    var si = getFieldScaleInfo(shadingField);
    var arrowOpt = (arrowsField && arrowsField !== 'none') ? getArrowOption(arrowsField) : null;
    var ci = contourField ? getFieldScaleInfo(contourField) : null;
    var sLabel = (data.meta.field_labels[shadingField] || shadingField);
    if (sLabel.indexOf('(') < 0) sLabel += ' (' + si.unit + ')';

    /* Compute data aspect ratio for dynamic height */
    var xRange = x[x.length - 1] - x[0];
    var yRange = y[y.length - 1] - y[0];
    var dataAR = Math.abs(yRange / xRange);

    dhKeys.forEach(function(dhKey, i) {
      var lev = data[dhKey][level];
      if (!lev) return;
      var shadeArr = getFieldArray(lev, shadingField, data.meta);
      var traces = [];
      var annotations = [];

      /* Shading filled contour (with light Gaussian smoothing) */
      if (shadeArr) {
        var gridSpacing = Math.abs(x[1] - x[0]) || 1.5;
        var smoothed = gaussianSmoothNaN(scaleArray(shadeArr, si.scale), 3.0, gridSpacing);
        var hm = {
          z: smoothed, x: x, y: y,
          type: 'contour',
          colorscale: 'RdBu',
          zmid: 0,
          contours: { coloring: 'heatmap' },
          ncontours: 15,
          line: { width: 0 }
        };
        /* Colorbar only on rightmost panel */
        if (i === dhKeys.length - 1) {
          hm.colorbar = {
            thickness: 10, len: 0.85,
            x: 1.02, xanchor: 'left', xpad: 4,
            exponentformat: 'power',
            tickfont: {size: 9},
            title: {text: sLabel, font: {size: 10}}
          };
        } else {
          hm.showscale = false;
        }
        traces.push(hm);
      }

      /* User-selected contour overlay (black solid) */
      if (contourField && lev[contourField]) {
        traces.push({
          z: ci ? scaleArray(lev[contourField], ci.scale) : lev[contourField],
          x: x, y: y,
          type: 'contour',
          contours: { coloring: 'none', showlabels: true, labelformat: '.4g' },
          line: { color: '#000000', width: 1.5 },
          showscale: false,
          ncontours: 10
        });
      }

      /* Arrow overlay + per-panel reference-legend */
      if (arrowOpt) {
        var overlay = buildVectorOverlayTrace(lev, arrowOpt, x, y);
        if (overlay) {
          overlay.traces.forEach(function(t) { traces.push(t); });
          if (overlay.annotation) annotations.push(overlay.annotation);
        }
      }

      /* Uniform margins: all panels same size; y-labels only on panel 0, colorbar only on panel 2 */
      var margins = { t: 35, b: 45, l: 55, r: 55 };

      /* Dynamic height: compute from container width + data aspect ratio */
      var el = document.getElementById('panel-' + i);
      var cw = el.getBoundingClientRect().width || 300;
      var plotW = Math.max(cw - margins.l - margins.r, 50);
      var dynH = Math.max(Math.round(plotW * dataAR + margins.t + margins.b), 200);

      var layout = {
        title: dhLabels[i],
        xaxis: { title: i === 1 ? 'Rel. Longitude (°)' : '', constrain: 'domain' },
        yaxis: {
          title: i === 0 ? 'Rel. Latitude (°)' : '',
          showticklabels: i === 0,
          scaleanchor: 'x', scaleratio: 1, constrain: 'domain'
        },
        margin: margins,
        height: dynH,
        showlegend: false,
        annotations: annotations
      };

      /* Always fully regenerate to avoid stale traces/annotations from previous selections. */
      Plotly.newPlot('panel-' + i, traces, layout, {responsive: true});
    });
  }

  /* ---- Gaussian smoothing (normalized convolution, handles NaN/zero) ---- */

  function gaussianSmoothNaN(field2d, smoothingDeg, gridSpacing) {
    var ny = field2d.length, nx = field2d[0].length;
    var sigmaDeg = smoothingDeg / 2.355; /* FWHM to sigma: sigma = FWHM / (2*sqrt(2*ln2)) */
    var sigmaGp = sigmaDeg / gridSpacing;
    var radius = Math.ceil(3 * sigmaGp);

    var kern = [];
    for (var k = -radius; k <= radius; k++) {
      kern.push(Math.exp(-0.5 * Math.pow(k / sigmaGp, 2)));
    }

    /* Pass 1: smooth along x (columns) with reflect boundary conditions */
    var tmp = [];
    var j, i;
    for (j = 0; j < ny; j++) {
      tmp[j] = new Float64Array(nx);
      for (i = 0; i < nx; i++) {
        var wSum = 0, vSum = 0;
        for (k = -radius; k <= radius; k++) {
          var ii = i + k;
          if (ii < 0) ii = -ii;
          if (ii >= nx) ii = 2 * nx - 2 - ii;
          var val = field2d[j][ii];
          if (val !== null && isFinite(val)) {
            var kw = kern[k + radius];
            wSum += kw;
            vSum += kw * val;
          }
        }
        tmp[j][i] = wSum > 0 ? vSum / wSum : 0;
      }
    }

    /* Pass 2: smooth along y (rows) with reflect boundary conditions */
    var out = [];
    for (j = 0; j < ny; j++) out[j] = new Array(nx);
    for (i = 0; i < nx; i++) {
      for (j = 0; j < ny; j++) {
        var wSum2 = 0, vSum2 = 0;
        for (k = -radius; k <= radius; k++) {
          var jj = j + k;
          if (jj < 0) jj = -jj;
          if (jj >= ny) jj = 2 * ny - 2 - jj;
          var val2 = tmp[jj][i];
          if (isFinite(val2)) {
            var kw2 = kern[k + radius];
            wSum2 += kw2;
            vSum2 += kw2 * val2;
          }
        }
        out[j][i] = wSum2 > 0 ? vSum2 / wSum2 : 0;
      }
    }

    /* Restore NaN positions from original */
    for (j = 0; j < ny; j++)
      for (i = 0; i < nx; i++)
        if (field2d[j][i] === null || !isFinite(field2d[j][i]))
          out[j][i] = NaN;

    return out;
  }

  /* ---- Projection ---- */

  function projectField(fieldArr, basis) {
    var useLap = document.getElementById('chk-lap').checked;
    /* If Lap checkbox is off and we have the nolap sub-basis, use it */
    var b = (!useLap && basis.nolap) ? basis.nolap : basis;

    var ny = fieldArr.length, nx = fieldArr[0].length;

    /* Gaussian smooth the input field (3.0° FWHM, 1.5° grid) */
    var smoothed = gaussianSmoothNaN(fieldArr, 3.0, 1.5);

    var w = b.weights, m = b.mask;

    function wip(f, g) {
      var s = 0;
      for (var j = 0; j < ny; j++)
        for (var i = 0; i < nx; i++)
          if (m[j][i] && isFinite(f[j][i]) && isFinite(g[j][i]))
            s += w[j][i] * f[j][i] * g[j][i];
      return s;
    }

    /* Coefficients (raw = in pre-normalized space) */
    var beta_raw   =  wip(smoothed, b.phi_int)    / b.norms.beta;
    var ax_raw     = -wip(smoothed, b.phi_dx)     / b.norms.ax;
    var ay_raw     = -wip(smoothed, b.phi_dy)     / b.norms.ay;
    var gamma1_raw = -wip(smoothed, b.phi_def)    / b.norms.gamma1;
    var gamma2_raw = -wip(smoothed, b.phi_strain) / b.norms.gamma2;
    /* When Lap is off the nolap basis has phi_lap≡0 and norms.sigma≈0;
       skip the division entirely to avoid 0/0 → NaN contamination. */
    var sigma_raw  = useLap ? (wip(smoothed, b.phi_lap) / b.norms.sigma) : 0;

    /* Physical-scale coefficients (multiply by scale factor / prenorm) */
    var sf = b.scale_factors;
    var beta   = beta_raw   * sf.beta;
    var ax     = ax_raw     * sf.ax;
    var ay     = ay_raw     * sf.ay;
    var gamma1 = gamma1_raw * sf.gamma1;
    var gamma2 = gamma2_raw * sf.gamma2;
    var sigma  = sigma_raw  * sf.sigma;

    /* Decomposed component arrays */
    var recon = [], inten = [], prop = [], deform = [], resid = [];
    var inten_beta = [], inten_sigma = [];
    var prop_x = [], prop_y = [];
    var def_shear = [], def_strain = [];
    var j, i;
    for (j = 0; j < ny; j++) {
      recon[j]      = new Array(nx);
      inten[j]      = new Array(nx);
      inten_beta[j] = new Array(nx);
      inten_sigma[j]= new Array(nx);
      prop[j]       = new Array(nx);
      prop_x[j]     = new Array(nx);
      prop_y[j]     = new Array(nx);
      deform[j]     = new Array(nx);
      def_shear[j]  = new Array(nx);
      def_strain[j] = new Array(nx);
      resid[j]      = new Array(nx);
      for (i = 0; i < nx; i++) {
        var ib =  beta_raw   * b.phi_int[j][i];
        var is_ = sigma_raw  * b.phi_lap[j][i];
        var px = -ax_raw     * b.phi_dx[j][i];
        var py = -ay_raw     * b.phi_dy[j][i];
        var ds = -gamma1_raw * b.phi_def[j][i];
        var dn = -gamma2_raw * b.phi_strain[j][i];

        inten_beta[j][i]  = ib;
        inten_sigma[j][i] = is_;
        inten[j][i]  = ib + is_;
        prop_x[j][i] = px;
        prop_y[j][i] = py;
        prop[j][i]   = px + py;
        def_shear[j][i]  = ds;
        def_strain[j][i] = dn;
        deform[j][i] = ds + dn;
        recon[j][i]  = ib + is_ + px + py + ds + dn;
        resid[j][i]  = m[j][i] ? smoothed[j][i] - recon[j][i] : NaN;
      }
    }

    /* R² (weighted) */
    var ss_res = 0, ss_tot = 0;
    for (j = 0; j < ny; j++) {
      for (i = 0; i < nx; i++) {
        if (m[j][i] && isFinite(smoothed[j][i])) {
          var r = smoothed[j][i] - recon[j][i];
          ss_res += w[j][i] * r * r;
          ss_tot += w[j][i] * smoothed[j][i] * smoothed[j][i];
        }
      }
    }
    var r_squared = ss_tot > 0 ? 1 - ss_res / ss_tot : 0;

    return {
      beta: beta, sigma: sigma, ax: ax, ay: ay,
      gamma1: gamma1, gamma2: gamma2,
      r_squared: r_squared, useLap: useLap,
      recon: recon, inten: inten, prop: prop, deform: deform,
      resid: resid, smoothed: smoothed
    };
  }

  function fmtSci(val) {
    if (val === 0) return '0.000';
    var exp = Math.floor(Math.log10(Math.abs(val)));
    var man = val / Math.pow(10, exp);
    var sup = String(exp).replace(/-/g, '\u207B').split('').map(function(c) {
      return '\u2070\u00B9\u00B2\u00B3\u2074\u2075\u2076\u2077\u2078\u2079'[parseInt(c)] || c;
    }).join('');
    return man.toFixed(3) + ' \u00D7 10' + sup;
  }

  function renderProjection(data, level, shadingField) {
    var dhKey = document.getElementById('sel-proj-dh').value;
    var dhLabel = {dh_m12: 'dh = −12 h', dh_0: 'dh = 0', dh_p12: 'dh = +12 h'}[dhKey];
    var basis = data[dhKey][level] && data[dhKey][level].basis;
    if (!basis) {
      document.getElementById('proj-info').textContent = 'No basis data for this level / ' + dhLabel + '.';
      ['proj-inten','proj-prop','proj-deform','proj-orig','proj-recon','proj-resid'].forEach(function(id) {
        document.getElementById(id).innerHTML = '';
      });
      return;
    }

    var fieldArr = getFieldArray(data[dhKey][level], shadingField, data.meta);
    if (!fieldArr) {
      document.getElementById('proj-info').textContent = 'Cannot project: field not available at ' + dhLabel + '.';
      return;
    }

    var si = getFieldScaleInfo(shadingField);
    var result = projectField(fieldArr, basis);
    var fieldName = data.meta.field_labels[shadingField] || shadingField;
    var nModes = result.useLap ? 6 : 5;
    var basisNote = (useAllEventBasis && data.meta.variant !== 'original') ? ' &mdash; <em>all-event basis</em>' : '';
    var info = document.getElementById('proj-info');
    info.innerHTML =
      '<b>Field:</b> ' + fieldName + ' (' + si.unit + ') at ' + dhLabel +
      ' &nbsp; [' + nModes + '-mode basis' + basisNote + ']<br>' +
      'β = ' + fmtSci(result.beta) + '  (Intensity)<br>' +
      (result.useLap ? ('σ = ' + fmtSci(result.sigma) + '  (Laplacian/Diffusion)<br>') : '') +
      'αx = ' + fmtSci(result.ax) + '  (Propagation-X)<br>' +
      'αy = ' + fmtSci(result.ay) + '  (Propagation-Y)<br>' +
      'γ₁ = ' + fmtSci(result.gamma1) + '  (Shear Deformation)<br>' +
      'γ₂ = ' + fmtSci(result.gamma2) + '  (Normal Strain)<br>' +
      'R² = ' + result.r_squared.toFixed(4) +
      '<br><small>β>0 → intensifying (blue center); β<0 → weakening</small>';

    var projPanels = [
      {id: 'proj-inten',  arr: result.inten,  label: result.useLap ? 'β·Φ₁ + σ·Φ₆ (INT)' : 'β·Φ₁ (INT)'},
      {id: 'proj-prop',   arr: result.prop,   label: '−αx·Φ₂ − αy·Φ₃ (PRP)'},
      {id: 'proj-deform', arr: result.deform, label: '−γ₁·Φ₄ − γ₂·Φ₅ (DEF)'}
    ];

    var bottomPanels = [
      {id: 'proj-orig',  arr: result.smoothed, label: 'Original Field'},
      {id: 'proj-recon', arr: result.recon,     label: 'Reconstruction'},
      {id: 'proj-resid', arr: result.resid,     label: 'Residual'}
    ];

    var x = data.coords.x_rel;
    var y = data.coords.y_rel;

    /* Compute data aspect ratio for projection panels */
    var xRange = x[x.length - 1] - x[0];
    var yRange = y[y.length - 1] - y[0];
    var projAR = Math.abs(yRange / xRange);

    /* Uniform margins: all projection panels identical size */
    var projM = { t: 35, b: 45, l: 55, r: 55 };

    /* Compute height from container width */
    var projContainer = document.querySelector('.bc-proj-panels .bc-panels');
    var fullCW = projContainer ? projContainer.getBoundingClientRect().width : 720;
    var perPanelW = (fullCW - 20) / 3;  /* subtract 2 gaps of 10px */
    var plotW = Math.max(perPanelW - projM.l - projM.r, 80);
    var projHeight = Math.max(Math.round(plotW * projAR + projM.t + projM.b), 250);

    /* Compute shared color range for top row */
    var topVmax = 0;
    projPanels.forEach(function(pp) {
      if (!pp.arr) return;
      for (var rj = 0; rj < pp.arr.length; rj++)
        for (var ri = 0; ri < pp.arr[rj].length; ri++) {
          var av = Math.abs(pp.arr[rj][ri] * si.scale);
          if (isFinite(av) && av > topVmax) topVmax = av;
        }
    });
    topVmax = topVmax || 1;

    /* Top row: Intensity, Propagation, Deformation */
    projPanels.forEach(function(pp, idx) {
      if (!pp.arr) return;
      var traceObj = {
        z: scaleArray(pp.arr, si.scale), x: x, y: y,
        type: 'heatmap',
        colorscale: 'RdBu',
        zmin: -topVmax, zmax: topVmax
      };
      /* Colorbar only on rightmost panel */
      if (idx === projPanels.length - 1) {
        traceObj.colorbar = {
          thickness: 10, len: 0.85,
          x: 1.02, xanchor: 'left', xpad: 4,
          exponentformat: 'power',
          tickfont: {size: 9},
          title: {text: si.unit, font: {size: 10}}
        };
      } else {
        traceObj.showscale = false;
      }
      Plotly.react(pp.id, [traceObj], {
        title: {text: pp.label, font: {size: 12}},
        xaxis: { title: idx === 1 ? 'Rel. Longitude (°)' : '', constrain: 'domain' },
        yaxis: {
          title: idx === 0 ? 'Rel. Latitude (°)' : '',
          showticklabels: idx === 0,
          scaleanchor: 'x', scaleratio: 1, constrain: 'domain'
        },
        margin: projM,
        height: projHeight
      }, {responsive: true});
    });

    /* Bottom row: shared vmin/vmax from original field */
    var vmax = 0;
    if (result.smoothed) {
      for (var rj = 0; rj < result.smoothed.length; rj++)
        for (var ri = 0; ri < result.smoothed[rj].length; ri++) {
          var av = Math.abs(result.smoothed[rj][ri] * si.scale);
          if (isFinite(av) && av > vmax) vmax = av;
        }
    }
    vmax = vmax || 1;  /* fallback */

    bottomPanels.forEach(function(bp, idx) {
      if (!bp.arr) return;
      var traceObj = {
        z: scaleArray(bp.arr, si.scale), x: x, y: y,
        type: 'heatmap',
        colorscale: 'RdBu',
        zmin: -vmax, zmax: vmax
      };
      /* Colorbar only on rightmost panel */
      if (idx === bottomPanels.length - 1) {
        traceObj.colorbar = {
          thickness: 10, len: 0.85,
          x: 1.02, xanchor: 'left', xpad: 4,
          exponentformat: 'power',
          tickfont: {size: 9},
          title: {text: si.unit, font: {size: 10}}
        };
      } else {
        traceObj.showscale = false;
      }
      Plotly.react(bp.id, [traceObj], {
        title: {text: bp.label, font: {size: 12}},
        xaxis: { title: idx === 1 ? 'Rel. Longitude (°)' : '', constrain: 'domain' },
        yaxis: {
          title: idx === 0 ? 'Rel. Latitude (°)' : '',
          showticklabels: idx === 0,
          scaleanchor: 'x', scaleratio: 1, constrain: 'domain'
        },
        margin: projM,
        height: projHeight
      }, {responsive: true});
    });
  }

  /* ---- Main update logic ---- */

  async function update() {
    var eventType = getEventTypePrefix();
    var variant = document.getElementById('sel-variant').value;
    var stage = document.getElementById('sel-stage').value;
    var level = document.getElementById('sel-level').value;
    var shadingField = document.getElementById('sel-shading').value;
    var contourField = document.getElementById('sel-contour').value;
    var arrowsField = document.getElementById('sel-arrows').value;

    /* Load catalog on first access to this event type */
    if (!catalogLoaded[eventType]) {
      var cat = await loadCatalog(eventType);
      if (cat) rebuildVariantDropdown(cat);
      catalogLoaded[eventType] = true;
      variant = document.getElementById('sel-variant').value;
    }

    var needFetch = !currentData ||
      currentData._eventType !== eventType ||
      currentData.meta.variant !== variant ||
      currentData.meta.stage !== stage;

    if (needFetch) {
      document.getElementById('loading').style.display = 'block';
      try {
        currentData = await fetchData(variant, stage);
      } catch (e) {
        document.getElementById('loading').style.display = 'none';
        alert('Error loading data: ' + e.message);
        return;
      }
      document.getElementById('loading').style.display = 'none';

      if (currentData === null) {
        document.getElementById('event-count').textContent =
          'No data available for this variant / stage combination.';
        ['panel-0','panel-1','panel-2'].forEach(function(id) {
          document.getElementById(id).innerHTML = '';
        });
        return;
      }

      currentData._eventType = eventType;

      if (!dropdownsBuilt) {
        buildShadingDropdown(currentData.meta);
        buildContourDropdown(currentData.meta);
        buildArrowsDropdown();
        dropdownsBuilt = true;
        /* Re-read selections after building */
        shadingField = document.getElementById('sel-shading').value;
        contourField = document.getElementById('sel-contour').value;
        arrowsField = document.getElementById('sel-arrows').value;
      }
    }

    /* Event count */
    var nEvents = currentData.meta.n_events && currentData.meta.n_events.dh_0;
    document.getElementById('event-count').textContent = nEvents ? ('n = ' + nEvents + ' events') : '';

    /* Disable all-event basis checkbox when viewing the all-events composite (no-op) */
    var chkAllEv = document.getElementById('chk-all-events');
    var isAllEvents = (currentData.meta.variant === 'original');
    chkAllEv.disabled = isAllEvents;
    if (isAllEvents) chkAllEv.checked = false;

    renderPanels(currentData, level, shadingField, contourField, arrowsField);

    /* Update projection if panel is open */
    if (document.getElementById('projection-panel').open) {
      await renderProjection(currentData, level, shadingField);
    }
  }

  /* ---- Event listeners ---- */

  ['sel-variant', 'sel-stage', 'sel-level', 'sel-shading', 'sel-contour', 'sel-arrows'].forEach(function(id) {
    document.getElementById(id).addEventListener('change', update);
  });

  /* Event type change → reset variant to 'original', rebuild variant dropdown */
  document.getElementById('sel-event-type').addEventListener('change', async function() {
    var et = getEventTypePrefix();
    currentData = null;
    dropdownsBuilt = false;
    /* Load catalog and rebuild variant dropdown */
    if (VARIANT_CATALOGS[et]) {
      rebuildVariantDropdown(VARIANT_CATALOGS[et]);
    } else {
      var sel = document.getElementById('sel-variant');
      sel.innerHTML = '<option value="original" selected>All Events</option>';
      catalogLoaded[et] = false;
    }
    update();
  });

  document.getElementById('projection-panel').addEventListener('toggle', function() {
    if (this.open && currentData) {
      var level = document.getElementById('sel-level').value;
      var shadingField = document.getElementById('sel-shading').value;
      renderProjection(currentData, level, shadingField);
    }
  });

  document.getElementById('sel-proj-dh').addEventListener('change', function() {
    if (document.getElementById('projection-panel').open && currentData) {
      var level = document.getElementById('sel-level').value;
      var shadingField = document.getElementById('sel-shading').value;
      renderProjection(currentData, level, shadingField);
    }
  });

  document.getElementById('chk-lap').addEventListener('change', function() {
    if (document.getElementById('projection-panel').open && currentData) {
      var level = document.getElementById('sel-level').value;
      var shadingField = document.getElementById('sel-shading').value;
      renderProjection(currentData, level, shadingField);
    }
  });

  document.getElementById('chk-all-events').addEventListener('change', function() {
    if (document.getElementById('projection-panel').open && currentData) {
      var level = document.getElementById('sel-level').value;
      var shadingField = document.getElementById('sel-shading').value;
      renderProjection(currentData, level, shadingField);
    }
  });

  document.getElementById('btn-generate').addEventListener('click', update);

  /* ---- Resize handler (debounced) for dynamic height recomputation ---- */
  var _resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(function() {
      if (currentData) update();
    }, 250);
  });

  /* ---- Initial load ---- */
  update();
})();
</script>
