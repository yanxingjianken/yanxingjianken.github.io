<script>
(function() {
  'use strict';

  var BASE = 'https://huggingface.co/datasets/yanxingjianken/blocking-composites/resolve/main';
  var DATA_CACHE = new Map();

  var CONTOUR_GROUPS = ['contour_base', 'contour_omega', 'contour_tendency', 'contour_diabatic', 'contour_pv_grad'];
  var PRENORM = {beta: 1e6, ax: 1e12, ay: 1e12, gamma: 1e18};
  var DEFAULT_SHADING = 'pv_dt';
  var DEFAULT_CONTOUR = 'z';

  function getFieldScaleInfo(fieldId) {
    if (fieldId === 'z') return {scale: 1, unit: 'm'};
    if (/^w($|_)/.test(fieldId)) return {scale: 1, unit: 'Pa s⁻¹'};
    if (['pv_anom','pv','pv_bar','Q'].indexOf(fieldId) >= 0) return {scale: 1e6, unit: 'PVU'};
    return {scale: 1e6, unit: 'PVU s⁻¹'};
  }

  function scaleArray(arr, scale) {
    if (scale === 1) return arr;
    return arr.map(function(row) {
      return row.map(function(v) { return (v === null || !isFinite(v)) ? v : v * scale; });
    });
  }

  var currentData = null;
  var dropdownsBuilt = false;

  /* ---- Data fetching ---- */

  async function fetchData(variant, stage) {
    var key = variant + '_' + stage;
    if (DATA_CACHE.has(key)) return DATA_CACHE.get(key);

    var url = BASE + '/' + key + '.json.gz';
    var resp = await fetch(url);
    if (!resp.ok) {
      if (resp.status === 404) return null;
      throw new Error('Fetch failed: ' + resp.status);
    }
    var ds = new DecompressionStream('gzip');
    var stream = resp.body.pipeThrough(ds);
    var text = await new Response(stream).text();
    var data = JSON.parse(text);
    DATA_CACHE.set(key, data);
    return data;
  }

  /* ---- Dropdown builders ---- */

  function buildShadingDropdown(meta) {
    var sel = document.getElementById('sel-shading');
    sel.innerHTML = '';
    var groups = meta.field_groups;
    var labels = meta.field_labels;

    Object.keys(groups).forEach(function(gid) {
      var grp = groups[gid];
      var og = document.createElement('optgroup');
      og.label = grp.label;
      grp.fields.forEach(function(fid) {
        var opt = document.createElement('option');
        opt.value = fid;
        opt.textContent = labels[fid] || fid;
        if (fid === DEFAULT_SHADING) opt.selected = true;
        og.appendChild(opt);
      });
      sel.appendChild(og);
    });

    /* PoM group */
    if (meta.pom_definitions && meta.pom_definitions.length > 0) {
      var pomOg = document.createElement('optgroup');
      pomOg.label = 'PoM (Product of Means)';
      meta.pom_definitions.forEach(function(pd) {
        var opt = document.createElement('option');
        opt.value = pd.id;
        opt.textContent = pd.label || pd.id;
        pomOg.appendChild(opt);
      });
      sel.appendChild(pomOg);
    }
  }

  function buildContourDropdown(meta) {
    var sel = document.getElementById('sel-contour');
    sel.innerHTML = '';
    var groups = meta.field_groups;
    var labels = meta.field_labels;

    /* None option */
    var noneOpt = document.createElement('option');
    noneOpt.value = '';
    noneOpt.textContent = 'None';
    sel.appendChild(noneOpt);

    CONTOUR_GROUPS.forEach(function(gid) {
      if (!groups[gid]) return;
      var grp = groups[gid];
      var og = document.createElement('optgroup');
      og.label = grp.label;
      grp.fields.forEach(function(fid) {
        var opt = document.createElement('option');
        opt.value = fid;
        opt.textContent = labels[fid] || fid;
        if (fid === DEFAULT_CONTOUR) opt.selected = true;
        og.appendChild(opt);
      });
      sel.appendChild(og);
    });
  }

  /* ---- Field array helper ---- */

  function getFieldArray(levelData, fieldId, meta) {
    if (levelData[fieldId]) return levelData[fieldId];

    /* PoM: compute product of means */
    var pomDef = null;
    if (meta.pom_definitions) {
      for (var k = 0; k < meta.pom_definitions.length; k++) {
        if (meta.pom_definitions[k].id === fieldId) {
          pomDef = meta.pom_definitions[k];
          break;
        }
      }
    }
    if (!pomDef) return null;

    var u = levelData[pomDef.u_wind];
    var v = levelData[pomDef.v_wind];
    var gx = levelData[pomDef.u_grad];
    var gy = levelData[pomDef.v_grad];
    if (!u || !v || !gx || !gy) return null;

    var ny = u.length, nx = u[0].length;
    var result = [];
    var sign = pomDef.negate ? -1 : 1;
    for (var j = 0; j < ny; j++) {
      result[j] = new Array(nx);
      for (var i = 0; i < nx; i++) {
        result[j][i] = sign * (u[j][i] * gx[j][i] + v[j][i] * gy[j][i]);
      }
    }
    return result;
  }

  /* ---- Rendering ---- */

  function renderPanels(data, level, shadingField, contourField) {
    var dhKeys = ['dh_m12', 'dh_0', 'dh_p12'];
    var dhLabels = ['dh = −12 h', 'dh = 0', 'dh = +12 h'];
    var x = data.coords.x_rel;
    var y = data.coords.y_rel;
    var si = getFieldScaleInfo(shadingField);
    var ci = contourField ? getFieldScaleInfo(contourField) : null;
    var sLabel = (data.meta.field_labels[shadingField] || shadingField);
    if (sLabel.indexOf('(') < 0) sLabel += ' (' + si.unit + ')';

    /* Compute data aspect ratio for dynamic height */
    var xRange = x[x.length - 1] - x[0];
    var yRange = y[y.length - 1] - y[0];
    var dataAR = Math.abs(yRange / xRange);

    dhKeys.forEach(function(dhKey, i) {
      var lev = data[dhKey][level];
      if (!lev) return;
      var shadeArr = getFieldArray(lev, shadingField, data.meta);
      var traces = [];

      /* Shading filled contour (with light Gaussian smoothing) */
      if (shadeArr) {
        var gridSpacing = Math.abs(x[1] - x[0]) || 1.5;
        var smoothed = gaussianSmoothNaN(scaleArray(shadeArr, si.scale), 3.0, gridSpacing);
        var hm = {
          z: smoothed, x: x, y: y,
          type: 'contour',
          colorscale: 'RdBu',
          zmid: 0,
          contours: { coloring: 'heatmap' },
          ncontours: 15,
          line: { width: 0 }
        };
        /* Colorbar only on rightmost panel */
        if (i === dhKeys.length - 1) {
          hm.colorbar = {
            thickness: 10, len: 0.7,
            exponentformat: 'power',
            tickfont: {size: 9},
            title: {text: sLabel, font: {size: 10}}
          };
        } else {
          hm.showscale = false;
        }
        traces.push(hm);
      }

      /* PV anomaly contour overlay (blue dashed, toggleable) */
      if (document.getElementById('chk-pvanom').checked && lev.pv_anom) {
        traces.push({
          z: scaleArray(lev.pv_anom, 1e6), x: x, y: y,
          type: 'contour',
          contours: { coloring: 'none', showlabels: true, labelformat: '.3g' },
          line: { color: 'rgba(31,119,180,0.7)', width: 1, dash: 'dash' },
          showscale: false,
          ncontours: 10
        });
      }

      /* User-selected contour overlay (black solid) */
      if (contourField && contourField !== 'pv_anom' && lev[contourField]) {
        traces.push({
          z: ci ? scaleArray(lev[contourField], ci.scale) : lev[contourField],
          x: x, y: y,
          type: 'contour',
          contours: { coloring: 'none', showlabels: true, labelformat: '.4g' },
          line: { color: '#000000', width: 1.5 },
          showscale: false,
          ncontours: 8
        });
      }

      /* Per-panel margins: left panel has y-title, right panel has colorbar */
      var margins;
      if (i === 0) {
        margins = { t: 35, b: 45, l: 55, r: 10 };
      } else if (i === dhKeys.length - 1) {
        margins = { t: 35, b: 45, l: 10, r: 55 };
      } else {
        margins = { t: 35, b: 45, l: 10, r: 10 };
      }

      /* Dynamic height: compute from container width + data aspect ratio */
      var el = document.getElementById('panel-' + i);
      var cw = el.getBoundingClientRect().width || 300;
      var plotW = Math.max(cw - margins.l - margins.r, 50);
      var dynH = Math.max(Math.round(plotW * dataAR + margins.t + margins.b), 200);

      var layout = {
        title: dhLabels[i],
        xaxis: { title: i === 1 ? 'Rel. Longitude (°)' : '', constrain: 'domain' },
        yaxis: { title: i === 0 ? 'Rel. Latitude (°)' : '', scaleanchor: 'x', scaleratio: 1, constrain: 'domain' },
        margin: margins,
        height: dynH,
        showlegend: false
      };

      Plotly.react('panel-' + i, traces, layout, {responsive: true});
    });
  }

  /* ---- Gaussian smoothing (normalized convolution, handles NaN/zero) ---- */

  function gaussianSmoothNaN(field2d, smoothingDeg, gridSpacing) {
    var ny = field2d.length, nx = field2d[0].length;
    var sigmaDeg = smoothingDeg / 2.355; /* FWHM to sigma: sigma = FWHM / (2*sqrt(2*ln2)) */
    var sigmaGp = sigmaDeg / gridSpacing;
    var radius = Math.ceil(3 * sigmaGp);

    var kern = [];
    for (var k = -radius; k <= radius; k++) {
      kern.push(Math.exp(-0.5 * Math.pow(k / sigmaGp, 2)));
    }

    /* Pass 1: smooth along x (columns) with reflect boundary conditions */
    var tmp = [];
    var j, i;
    for (j = 0; j < ny; j++) {
      tmp[j] = new Float64Array(nx);
      for (i = 0; i < nx; i++) {
        var wSum = 0, vSum = 0;
        for (k = -radius; k <= radius; k++) {
          var ii = i + k;
          if (ii < 0) ii = -ii;
          if (ii >= nx) ii = 2 * nx - 2 - ii;
          var val = field2d[j][ii];
          if (val !== null && isFinite(val)) {
            var kw = kern[k + radius];
            wSum += kw;
            vSum += kw * val;
          }
        }
        tmp[j][i] = wSum > 0 ? vSum / wSum : 0;
      }
    }

    /* Pass 2: smooth along y (rows) with reflect boundary conditions */
    var out = [];
    for (j = 0; j < ny; j++) out[j] = new Array(nx);
    for (i = 0; i < nx; i++) {
      for (j = 0; j < ny; j++) {
        var wSum2 = 0, vSum2 = 0;
        for (k = -radius; k <= radius; k++) {
          var jj = j + k;
          if (jj < 0) jj = -jj;
          if (jj >= ny) jj = 2 * ny - 2 - jj;
          var val2 = tmp[jj][i];
          if (isFinite(val2)) {
            var kw2 = kern[k + radius];
            wSum2 += kw2;
            vSum2 += kw2 * val2;
          }
        }
        out[j][i] = wSum2 > 0 ? vSum2 / wSum2 : 0;
      }
    }

    /* Restore NaN positions from original */
    for (j = 0; j < ny; j++)
      for (i = 0; i < nx; i++)
        if (field2d[j][i] === null || !isFinite(field2d[j][i]))
          out[j][i] = NaN;

    return out;
  }

  /* ---- Projection ---- */

  function projectField(fieldArr, basis) {
    var ny = fieldArr.length, nx = fieldArr[0].length;

    /* Gaussian smooth the input field (3.0° FWHM, 1.5° grid) */
    var smoothed = gaussianSmoothNaN(fieldArr, 3.0, 1.5);

    var w = basis.weights, m = basis.mask;

    function wip(f, g) {
      var s = 0;
      for (var j = 0; j < ny; j++)
        for (var i = 0; i < nx; i++)
          if (m[j][i] && isFinite(f[j][i]) && isFinite(g[j][i]))
            s += w[j][i] * f[j][i] * g[j][i];
      return s;
    }

    var beta_raw  =  wip(smoothed, basis.phi_int) / basis.norms.beta;
    var ax_raw    = -wip(smoothed, basis.phi_dx)  / basis.norms.ax;
    var ay_raw    = -wip(smoothed, basis.phi_dy)  / basis.norms.ay;
    var gamma_raw =  wip(smoothed, basis.phi_def) / basis.norms.gamma;

    var beta  = beta_raw  * PRENORM.beta;
    var ax    = ax_raw    * PRENORM.ax;
    var ay    = ay_raw    * PRENORM.ay;
    var gamma = gamma_raw * PRENORM.gamma;

    /* Decomposed components */
    var recon = [], inten = [], prop_x = [], prop_y = [], prop = [], deform = [], resid = [];
    var j, i;
    for (j = 0; j < ny; j++) {
      recon[j]   = new Array(nx);
      inten[j]   = new Array(nx);
      prop_x[j]  = new Array(nx);
      prop_y[j]  = new Array(nx);
      prop[j]    = new Array(nx);
      deform[j]  = new Array(nx);
      resid[j]   = new Array(nx);
      for (i = 0; i < nx; i++) {
        inten[j][i]  = beta_raw  * basis.phi_int[j][i];
        prop_x[j][i] = -ax_raw   * basis.phi_dx[j][i];
        prop_y[j][i] = -ay_raw   * basis.phi_dy[j][i];
        prop[j][i]   = prop_x[j][i] + prop_y[j][i];
        deform[j][i] = gamma_raw * basis.phi_def[j][i];
        recon[j][i]  = inten[j][i] + prop_x[j][i] + prop_y[j][i] + deform[j][i];
        resid[j][i]  = m[j][i] ? smoothed[j][i] - recon[j][i] : NaN;
      }
    }

    /* R² (weighted) */
    var ss_res = 0, ss_tot = 0;
    for (j = 0; j < ny; j++) {
      for (i = 0; i < nx; i++) {
        if (m[j][i] && isFinite(smoothed[j][i])) {
          var r = smoothed[j][i] - recon[j][i];
          ss_res += w[j][i] * r * r;
          ss_tot += w[j][i] * smoothed[j][i] * smoothed[j][i];
        }
      }
    }
    var r_squared = ss_tot > 0 ? 1 - ss_res / ss_tot : 0;

    return { beta: beta, ax: ax, ay: ay, gamma: gamma, r_squared: r_squared,
             recon: recon, inten: inten, prop_x: prop_x, prop_y: prop_y,
             prop: prop, deform: deform, resid: resid, smoothed: smoothed };
  }

  function fmtSci(val) {
    if (val === 0) return '0.000';
    var exp = Math.floor(Math.log10(Math.abs(val)));
    var man = val / Math.pow(10, exp);
    var sup = String(exp).replace(/-/g, '\u207B').split('').map(function(c) {
      return '\u2070\u00B9\u00B2\u00B3\u2074\u2075\u2076\u2077\u2078\u2079'[parseInt(c)] || c;
    }).join('');
    return man.toFixed(3) + ' \u00D7 10' + sup;
  }

  function renderProjection(data, level, shadingField) {
    var dhKey = document.getElementById('sel-proj-dh').value;
    var dhLabel = {dh_m12: 'dh = −12 h', dh_0: 'dh = 0', dh_p12: 'dh = +12 h'}[dhKey];
    var basis = data[dhKey][level] && data[dhKey][level].basis;
    if (!basis) {
      document.getElementById('proj-info').textContent = 'No basis data for this level / ' + dhLabel + '.';
      ['proj-inten','proj-prop','proj-deform','proj-orig','proj-recon','proj-resid'].forEach(function(id) {
        document.getElementById(id).innerHTML = '';
      });
      return;
    }

    var fieldArr = getFieldArray(data[dhKey][level], shadingField, data.meta);
    if (!fieldArr) {
      document.getElementById('proj-info').textContent = 'Cannot project: field not available at ' + dhLabel + '.';
      return;
    }

    var si = getFieldScaleInfo(shadingField);
    var result = projectField(fieldArr, basis);
    var fieldName = data.meta.field_labels[shadingField] || shadingField;
    var info = document.getElementById('proj-info');
    info.innerHTML =
      '<b>Field:</b> ' + fieldName + ' (' + si.unit + ') at ' + dhLabel + '<br>' +
      'β = ' + fmtSci(result.beta) + '  (Intensity)<br>' +
      'αx = ' + fmtSci(result.ax) + '  (Propagation-X)<br>' +
      'αy = ' + fmtSci(result.ay) + '  (Propagation-Y)<br>' +
      'γ = ' + fmtSci(result.gamma) + '  (Deformation)<br>' +
      'R² = ' + result.r_squared.toFixed(4) +
      '<br><small>β>0 → intensifying (blue center); β<0 → weakening (red center)</small>';

    var projPanels = [
      {id: 'proj-inten',  arr: result.inten,  label: 'β·Φ₁ (Intensity)'},
      {id: 'proj-prop',   arr: result.prop,   label: '−α·∇Φ (Propagation)'},
      {id: 'proj-deform', arr: result.deform, label: 'γ·Φ₄ (Deformation)'}
    ];

    var bottomPanels = [
      {id: 'proj-orig',  arr: result.smoothed, label: 'Original Field'},
      {id: 'proj-recon', arr: result.recon,     label: 'Reconstruction'},
      {id: 'proj-resid', arr: result.resid,     label: 'Residual'}
    ];

    var x = data.coords.x_rel;
    var y = data.coords.y_rel;

    /* Compute data aspect ratio for projection panels */
    var xRange = x[x.length - 1] - x[0];
    var yRange = y[y.length - 1] - y[0];
    var projAR = Math.abs(yRange / xRange);

    /* Per-panel margins: leftmost has y-title, rightmost has colorbar */
    var projML = { t: 35, b: 45, l: 55, r: 10 };
    var projMM = { t: 35, b: 45, l: 10, r: 10 };
    var projMR = { t: 35, b: 45, l: 10, r: 55 };

    /* Compute height from container width */
    var projContainer = document.querySelector('.bc-proj-panels .bc-panels');
    var fullCW = projContainer ? projContainer.getBoundingClientRect().width : 720;
    var perPanelW = (fullCW - 20) / 3;  /* subtract 2 gaps of 10px */
    var plotW = Math.max(perPanelW - projML.l - projML.r, 80);
    var projHeight = Math.max(Math.round(plotW * projAR + projML.t + projML.b), 250);

    /* Top row: Intensity, Propagation, Deformation */
    projPanels.forEach(function(pp, idx) {
      if (!pp.arr) return;
      var traceObj = {
        z: scaleArray(pp.arr, si.scale), x: x, y: y,
        type: 'heatmap',
        colorscale: 'RdBu',
        zmid: 0
      };
      /* Colorbar only on rightmost panel */
      if (idx === projPanels.length - 1) {
        traceObj.colorbar = {
          thickness: 10, len: 0.7,
          exponentformat: 'power',
          tickfont: {size: 9},
          title: {text: si.unit, font: {size: 10}}
        };
      } else {
        traceObj.showscale = false;
      }
      var pM = idx === 0 ? projML : (idx === projPanels.length - 1 ? projMR : projMM);
      Plotly.react(pp.id, [traceObj], {
        title: {text: pp.label, font: {size: 12}},
        xaxis: { title: idx === 1 ? 'Rel. Longitude (°)' : '', constrain: 'domain' },
        yaxis: { title: idx === 0 ? 'Rel. Latitude (°)' : '', scaleanchor: 'x', scaleratio: 1, constrain: 'domain' },
        margin: pM,
        height: projHeight
      }, {responsive: true});
    });

    /* Bottom row: shared vmin/vmax from original field */
    var vmax = 0;
    if (result.smoothed) {
      for (var rj = 0; rj < result.smoothed.length; rj++)
        for (var ri = 0; ri < result.smoothed[rj].length; ri++) {
          var av = Math.abs(result.smoothed[rj][ri] * si.scale);
          if (isFinite(av) && av > vmax) vmax = av;
        }
    }
    vmax = vmax || 1;  /* fallback */

    bottomPanels.forEach(function(bp, idx) {
      if (!bp.arr) return;
      var traceObj = {
        z: scaleArray(bp.arr, si.scale), x: x, y: y,
        type: 'heatmap',
        colorscale: 'RdBu',
        zmin: -vmax, zmax: vmax
      };
      /* Colorbar only on rightmost panel */
      if (idx === bottomPanels.length - 1) {
        traceObj.colorbar = {
          thickness: 10, len: 0.7,
          exponentformat: 'power',
          tickfont: {size: 9},
          title: {text: si.unit, font: {size: 10}}
        };
      } else {
        traceObj.showscale = false;
      }
      var bM = idx === 0 ? projML : (idx === bottomPanels.length - 1 ? projMR : projMM);
      Plotly.react(bp.id, [traceObj], {
        title: {text: bp.label, font: {size: 12}},
        xaxis: { title: idx === 1 ? 'Rel. Longitude (°)' : '', constrain: 'domain' },
        yaxis: { title: idx === 0 ? 'Rel. Latitude (°)' : '', scaleanchor: 'x', scaleratio: 1, constrain: 'domain' },
        margin: bM,
        height: projHeight
      }, {responsive: true});
    });
  }

  /* ---- Main update logic ---- */

  async function update() {
    var variant = document.getElementById('sel-variant').value;
    var stage = document.getElementById('sel-stage').value;
    var level = document.getElementById('sel-level').value;
    var shadingField = document.getElementById('sel-shading').value;
    var contourField = document.getElementById('sel-contour').value;

    var needFetch = !currentData ||
      currentData.meta.variant !== variant ||
      currentData.meta.stage !== stage;

    if (needFetch) {
      document.getElementById('loading').style.display = 'block';
      try {
        currentData = await fetchData(variant, stage);
      } catch (e) {
        document.getElementById('loading').style.display = 'none';
        alert('Error loading data: ' + e.message);
        return;
      }
      document.getElementById('loading').style.display = 'none';

      if (currentData === null) {
        document.getElementById('event-count').textContent =
          'No data available for this variant / stage combination.';
        ['panel-0','panel-1','panel-2'].forEach(function(id) {
          document.getElementById(id).innerHTML = '';
        });
        return;
      }

      if (!dropdownsBuilt) {
        buildShadingDropdown(currentData.meta);
        buildContourDropdown(currentData.meta);
        dropdownsBuilt = true;
        /* Re-read selections after building */
        shadingField = document.getElementById('sel-shading').value;
        contourField = document.getElementById('sel-contour').value;
      }
    }

    /* Event count */
    var nEvents = currentData.meta.n_events && currentData.meta.n_events.dh_0;
    document.getElementById('event-count').textContent = nEvents ? ('n = ' + nEvents + ' events') : '';

    renderPanels(currentData, level, shadingField, contourField);

    /* Update projection if panel is open */
    if (document.getElementById('projection-panel').open) {
      renderProjection(currentData, level, shadingField);
    }
  }

  /* ---- Event listeners ---- */

  ['sel-variant', 'sel-stage', 'sel-level', 'sel-shading', 'sel-contour'].forEach(function(id) {
    document.getElementById(id).addEventListener('change', update);
  });

  document.getElementById('chk-pvanom').addEventListener('change', update);

  document.getElementById('projection-panel').addEventListener('toggle', function() {
    if (this.open && currentData) {
      var level = document.getElementById('sel-level').value;
      var shadingField = document.getElementById('sel-shading').value;
      renderProjection(currentData, level, shadingField);
    }
  });

  document.getElementById('sel-proj-dh').addEventListener('change', function() {
    if (document.getElementById('projection-panel').open && currentData) {
      var level = document.getElementById('sel-level').value;
      var shadingField = document.getElementById('sel-shading').value;
      renderProjection(currentData, level, shadingField);
    }
  });

  document.getElementById('btn-generate').addEventListener('click', update);

  /* ---- Resize handler (debounced) for dynamic height recomputation ---- */
  var _resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(function() {
      if (currentData) update();
    }, 250);
  });

  /* ---- Initial load ---- */
  update();
})();
</script>
